<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115 私立弘明實驗高級中學 美術歷程系統</title>
    <style>
        body {
            display: flex;
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background-color: #f4f6f9;
        }
        * {
            box-sizing: border-box;
        }
        .left {
            flex: 0 0 22%;
            background-color: #fff;
            padding: 30px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        .right {
            flex: 0 0 78%;
            min-width: 0;
            padding: 40px;
            overflow-y: auto;
        }
        .left h1 { font-size: 20px; color: #333; margin-bottom: 20px; }
        .left h2 { font-size: 18px; color: #555; }
        .left p { color: #666; line-height: 1.6; }
        
        .menu-link {
            display: block;
            padding: 12px;
            margin: 8px 0;
            color: #444;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .menu-link:hover, .menu-link.active {
            background-color: rgb(161, 161, 255);
            color: white;
            font-weight: bold;
        }

        /* 右側各面板樣式與動畫 */
        .panel {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            animation: fadeIn 0.4s ease forwards;
            overflow-x: auto;
        }
        
        /* 表格樣式 */
        table { width: 100%; min-width: 760px; border-collapse: collapse; margin-top: 15px; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; }

        /* 上傳按鈕 */
        .upload-btn {
            background-color: rgb(161, 161, 255); color: white; border: none;
            padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 10px;
        }
        .upload-btn:hover { background-color: rgb(120, 120, 255); }
        .upload-btn:disabled { cursor: not-allowed; opacity: 0.65; }
        .notice { color: #666; line-height: 1.6; }
        .danger-btn {
            background-color: #d94848;
            color: white;
            border: 0;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
        }
        .danger-btn:hover { background-color: #b83232; }
        .danger-btn:disabled { cursor: not-allowed; opacity: 0.65; }
        .status-active { color: #2b8a3e; font-weight: bold; }
        .status-revoked { color: #c92a2a; }
        .assignment-title { min-width: 180px; font-weight: bold; color: #333; }
        .assignment-note { color: #666; line-height: 1.5; }
        .assignment-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            min-width: 280px;
        }
        .assignment-actions input[type="file"] {
            max-width: 210px;
        }
        .assignment-message {
            flex-basis: 100%;
            min-height: 18px;
            color: #666;
            font-size: 13px;
        }
        .submission-link {
            display: inline-block;
            margin-top: 6px;
        }
        .loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 14px;
            color: #444;
            background: rgba(244, 246, 249, 0.96);
        }
        .loading-overlay.hidden {
            display: none;
        }
        .loading-spinner {
            width: 42px;
            height: 42px;
            border: 4px solid #d8dde6;
            border-top-color: rgb(120, 120, 255);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 900px) {
            body {
                display: block;
            }
            .left {
                width: 100%;
                padding: 22px 18px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            }
            .right {
                width: 100%;
                padding: 18px;
                overflow: visible;
            }
            .left h1 {
                font-size: 18px;
                margin-bottom: 14px;
            }
            .left h2 {
                font-size: 16px;
            }
            .menu-link {
                margin: 6px 0;
                padding: 12px 14px;
            }
            .panel {
                padding: 20px 16px;
            }
            .assignment-actions {
                min-width: 0;
            }
        }

        @media (max-width: 560px) {
            .right {
                padding: 12px;
            }
            .panel {
                padding: 16px 12px;
                border-radius: 6px;
            }
            table {
                min-width: 680px;
            }
            th, td {
                padding: 10px;
            }
            .assignment-title {
                min-width: 140px;
            }
            .assignment-actions {
                display: grid;
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .assignment-actions input[type="file"],
            .assignment-actions .upload-btn,
            .danger-btn,
            #status-panel .upload-btn {
                width: 100%;
                max-width: none;
            }
        }
    </style>
</head>

<body>
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div id="loading-text">正在載入系統資料...</div>
    </div>

    <div class="left">
        <h1>弘明實驗高級中學<br>115美術歷程系統</h1>
        <hr style="width:100%; border:0; border-top:1px solid #eee;">
        <h2>姓名：<span id="u-name">讀取中...</span></h2>
        <p>
            學號：<span id="u-id">-</span><br>
            班級：<span id="u-class">-</span><br>
            當前美術社團：<span id="u-club">-</span>
        </p>
        <br>
        <a href="#" class="menu-link active" onclick="switchPanel('schedule-panel', this)">時程與繳交</a>
        <a href="#" class="menu-link" onclick="switchPanel('status-panel', this)">已繳交內容</a>
        <a href="question.html" class="menu-link">問題回報</a>
        <a href="#" class="menu-link" onclick="logout()">登出</a>
    </div>

    <div class="right">
        <div id="schedule-panel" class="panel" style="display: block;">
            <h3>美術歷程時程與繳交</h3>
            <p class="notice">請在對應項目直接選擇 PDF 檔案並送出。已繳交的項目需先到「已繳交內容」撤銷並刪除原檔後才能重新提交。</p>
            <table>
                <thead>
                    <tr><th>項目</th><th>截止日期</th><th>備註</th><th>狀態</th><th>繳交</th></tr>
                </thead>
                <tbody id="schedule-list">
                    <tr><td colspan="5">正在載入時程資料...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="status-panel" class="panel">
            <h3>已繳交內容狀態</h3>
            <button type="button" class="upload-btn" onclick="loadMySubmissions()">重新整理</button>
            <p id="status-message" class="notice"></p>
            <table>
                <thead>
                    <tr><th>項目</th><th>檔案</th><th>繳交時間</th><th>狀態</th><th>操作</th></tr>
                </thead>
                <tbody id="my-submissions-list">
                    <tr><td colspan="5">正在載入繳交紀錄...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let GAS_API_URL = "";
        let currentUser = null;
        let scheduleItems = [];
        let mySubmissions = [];
        let submissionsLoaded = false;

        document.addEventListener("DOMContentLoaded", function () {
            // 1. 驗證權限與身份
            const userData = sessionStorage.getItem('user');
            if (!userData) {
                alert('未登入，請先登入系統！');
                window.location.href = 'login.html';
                return;
            }

            try {
                currentUser = JSON.parse(userData);
            } catch (err) {
                sessionStorage.removeItem('user');
                alert('登入資料異常，請重新登入。');
                window.location.href = 'login.html';
                return;
            }

            // ⚠️ 核心判定：如果班級為管理員，直接跳轉到 manage.html
            if (currentUser.className === "管理員") {
                alert("管理員身份確認，引導至後台管理頁面。");
                window.location.href = "manage.html";
                return;
            }

            fetch('api.json')
                .then(res => res.json())
                .then(config => {
                    GAS_API_URL = config.gasUrl;
                    return validateSession();
                })
                .then(user => {
                    currentUser = user;
                    sessionStorage.setItem('user', JSON.stringify(user));
                    renderCurrentUser();
                    return Promise.all([loadSchedule(), loadMySubmissions()]);
                })
                .then(() => {
                    hideLoading();
                })
                .catch(err => {
                    if (err && err.redirect) return;
                    forceLogout(err.message || '登入已失效，請重新登入。');
                });
        });

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function formatDateTime(value) {
            if (!value) return '-';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return escapeHtml(value);
            return date.toLocaleString('zh-TW');
        }

        function postForm(payload) {
            const formData = new URLSearchParams();
            Object.keys(payload).forEach(key => formData.append(key, payload[key] ?? ''));
            return fetch(GAS_API_URL, {
                method: 'POST',
                body: formData.toString(),
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            }).then(res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            });
        }

        function getAuthParams() {
            return {
                studentId: currentUser?.studentId || '',
                sessionToken: currentUser?.sessionToken || ''
            };
        }

        function withAuthQuery(url) {
            const params = new URLSearchParams(getAuthParams());
            return `${url}&${params.toString()}`;
        }

        function validateSession() {
            if (!currentUser?.studentId || !currentUser?.sessionToken) {
                return Promise.reject(new Error('登入已失效，請重新登入。'));
            }
            return fetch(withAuthQuery(`${GAS_API_URL}?action=validateSession`))
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    if (!data.success) throw new Error(data.message || '登入已失效，請重新登入。');
                    if (data.user.className === "管理員") {
                        window.location.href = "manage.html";
                        throw { redirect: true };
                    }
                    return data.user;
                });
        }

        function renderCurrentUser() {
            document.getElementById('u-name').innerText = currentUser.name;
            document.getElementById('u-id').innerText = currentUser.studentId;
            document.getElementById('u-class').innerText = currentUser.className;
            document.getElementById('u-club').innerText = currentUser.club;
        }

        function forceLogout(message) {
            sessionStorage.removeItem('user');
            if (message) alert(message);
            window.location.href = 'login.html';
        }

        function clearServerSession() {
            if (!GAS_API_URL || !currentUser?.studentId || !currentUser?.sessionToken) {
                return Promise.resolve();
            }
            return postForm({
                action: 'logout',
                studentId: currentUser.studentId,
                sessionToken: currentUser.sessionToken
            }).catch(() => {});
        }

        function hideLoading() {
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        // 切換右側面板
        function switchPanel(panelId, element) {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.menu-link').forEach(l => l.classList.remove('active'));
            
            document.getElementById(panelId).style.display = 'block';
            element.classList.add('active');
        }

        function logout() {
            clearServerSession().finally(() => {
                sessionStorage.removeItem('user');
                window.location.href = 'login.html';
            });
        }

        // 撈取 Google Sheet 的時程表 (GET)
        function loadSchedule() {
            if (!GAS_API_URL) return Promise.resolve();
            return fetch(`${GAS_API_URL}?action=getSchedule`)
                .then(res => res.json())
                .then(data => {
                    scheduleItems = Array.isArray(data) ? data : [];
                    renderSchedule();
                })
                .catch(err => {
                    scheduleItems = [];
                    document.getElementById('schedule-list').innerHTML = "<tr><td colspan='5'>時程載入失敗。</td></tr>";
                });
        }

        function getActiveSubmission(task) {
            return mySubmissions.find(item =>
                item.status !== 'revoked' &&
                (item.task || '').toString() === (task || '').toString()
            );
        }

        function renderSchedule() {
            const tbody = document.getElementById('schedule-list');
            if (!scheduleItems || scheduleItems.length === 0) {
                tbody.innerHTML = "<tr><td colspan='5'>目前尚無安排時程。</td></tr>";
                return;
            }

            tbody.innerHTML = scheduleItems.map((item, index) => {
                const submitted = getActiveSubmission(item.task);
                const date = new Date(item.deadline);
                const dateStr = Number.isNaN(date.getTime()) ? escapeHtml(item.deadline || '-') : date.toLocaleDateString('zh-TW');
                const task = escapeHtml(item.task || '');
                const statusCell = !submissionsLoaded
                    ? '<span class="notice">檢查繳交狀態中...</span>'
                    : submitted
                    ? `<span class="status-active">已繳交</span><br><a class="submission-link" href="${escapeHtml(submitted.url || '#')}" target="_blank" rel="noopener">${escapeHtml(submitted.filename || '查看檔案')}</a>`
                    : '<span class="status-revoked">未繳交</span>';
                const actionCell = !submissionsLoaded
                    ? '<span class="notice">請稍候...</span>'
                    : submitted
                    ? '<span class="notice">如需重新提交，請先撤銷原繳交內容並刪除檔案。</span>'
                    : `
                        <div class="assignment-actions">
                            <input type="file" class="task-file" data-task="${task}" accept="application/pdf">
                            <button type="button" class="upload-btn submit-task" data-task="${task}">送出</button>
                            <span class="assignment-message"></span>
                        </div>
                    `;

                return `
                    <tr>
                        <td class="assignment-title">${task}</td>
                        <td>${dateStr}</td>
                        <td class="assignment-note">${escapeHtml(item.note || '')}</td>
                        <td>${statusCell}</td>
                        <td>${actionCell}</td>
                    </tr>
                `;
            }).join('');
        }

        function loadMySubmissions() {
            if (!GAS_API_URL || !currentUser) return Promise.resolve();
            document.getElementById('status-message').innerText = '正在載入繳交紀錄...';
            return fetch(withAuthQuery(`${GAS_API_URL}?action=getMySubmissions`))
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    if (!Array.isArray(data) && data && data.success === false) {
                        forceLogout(data.message || '登入已失效，請重新登入。');
                        return;
                    }
                    mySubmissions = Array.isArray(data) ? data : [];
                    submissionsLoaded = true;
                    renderMySubmissions();
                    renderSchedule();
                    document.getElementById('status-message').innerText = '';
                })
                .catch(err => {
                    mySubmissions = [];
                    submissionsLoaded = false;
                    renderMySubmissions();
                    renderSchedule();
                    document.getElementById('status-message').innerText = '繳交紀錄載入失敗。';
                });
        }

        function renderMySubmissions() {
            const tbody = document.getElementById('my-submissions-list');
            if (mySubmissions.length === 0) {
                tbody.innerHTML = "<tr><td colspan='5'>目前尚無繳交紀錄。</td></tr>";
                return;
            }

            tbody.innerHTML = mySubmissions.map(item => {
                const isRevoked = item.status === 'revoked';
                const fileCell = item.url
                    ? `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${escapeHtml(item.filename || '查看檔案')}</a>`
                    : escapeHtml(item.filename || '-');
                const statusCell = isRevoked
                    ? '<span class="status-revoked">已撤銷</span>'
                    : '<span class="status-active">已繳交</span>';
                const actionCell = isRevoked
                    ? '-'
                    : `<button type="button" class="danger-btn revoke-submission" data-id="${escapeHtml(item.id)}">撤銷</button>`;
                return `
                    <tr>
                        <td>${escapeHtml(item.task || '')}</td>
                        <td>${fileCell}</td>
                        <td>${formatDateTime(item.createdAt)}</td>
                        <td>${statusCell}</td>
                        <td>${actionCell}</td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('my-submissions-list').addEventListener('click', function(e) {
            const button = e.target.closest('.revoke-submission');
            if (!button) return;
            if (button.disabled) return;
            if (!confirm('確定要撤銷這份繳交內容並刪除雲端檔案嗎？撤銷後才可以重新提交同項目。')) return;

            button.disabled = true;
            button.innerText = '撤銷中...';

            postForm({
                action: 'revokeSubmission',
                id: button.dataset.id,
                ...getAuthParams()
            })
            .then(data => {
                if (!data.success && /登入|密鑰|逾時/.test(data.message || '')) {
                    forceLogout(data.message);
                    return;
                }
                alert(data.message || (data.success ? '已撤銷。' : '撤銷失敗。'));
                loadMySubmissions();
            })
            .catch(err => alert('撤銷連線失敗，請稍後再試。'))
            .finally(() => {
                button.disabled = false;
                button.innerText = '撤銷';
            });
        });

        document.getElementById('schedule-list').addEventListener('click', function(e) {
            const button = e.target.closest('.submit-task');
            if (!button) return;
            submitScheduleTask(button);
        });

        function submitScheduleTask(button) {
            if (button.disabled) return;
            if (!GAS_API_URL) {
                alert('API 尚未就緒，請稍後再試');
                return;
            }

            const actionBox = button.closest('.assignment-actions');
            const fileInput = actionBox.querySelector('.task-file');
            const message = actionBox.querySelector('.assignment-message');
            const task = button.dataset.task || '';

            if (!fileInput.files.length) {
                alert('請先選擇 PDF 檔案。');
                return;
            }

            const file = fileInput.files[0];
            if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
                alert('請上傳 PDF 檔案。');
                return;
            }

            button.disabled = true;
            fileInput.disabled = true;
            button.innerText = '上傳中...';
            message.innerText = '正在讀取檔案...';

            const reader = new FileReader();
            reader.onload = function(e) {
                const dataUrl = e.target.result;
                const base64Data = dataUrl.includes(',') ? dataUrl.split(',')[1] : dataUrl;
                const formData = new URLSearchParams();
                formData.append("action", "uploadPDF");
                formData.append("studentId", currentUser.studentId);
                formData.append("sessionToken", currentUser.sessionToken || "");
                formData.append("studentName", currentUser.name);
                formData.append("className", currentUser.className);
                formData.append("club", currentUser.club || "");
                formData.append("task", task);
                formData.append("scheduleTask", task);
                formData.append("originalFilename", file.name);
                formData.append("filename", `${task}_${currentUser.studentId}_${currentUser.name}_${file.name}`);
                formData.append("mimeType", "application/pdf");
                formData.append("file", dataUrl);
                formData.append("fileBase64", base64Data);

                message.innerText = "正在上傳至雲端...";
                fetch(GAS_API_URL, {
                    method: 'POST',
                    body: formData.toString(),
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                })
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    if (!data.success && /登入|密鑰|逾時/.test(data.message || '')) {
                        forceLogout(data.message);
                        return;
                    }

                    const text = data.message || (data.success ? "上傳成功。" : "上傳失敗。");
                    alert(text);
                    message.innerText = text;
                    if (data.success) {
                        fileInput.value = "";
                        loadMySubmissions();
                        return;
                    }
                    button.disabled = false;
                    fileInput.disabled = false;
                    button.innerText = '送出';
                })
                .catch(err => {
                    console.error(err);
                    message.innerText = "上傳連線發生錯誤，請稍後再試。";
                    alert("上傳連線發生錯誤，請稍後再試。");
                    button.disabled = false;
                    fileInput.disabled = false;
                    button.innerText = '送出';
                });
            };
            reader.onerror = function() {
                message.innerText = "檔案讀取失敗，請重新選擇 PDF。";
                alert("檔案讀取失敗，請重新選擇 PDF。");
                button.disabled = false;
                fileInput.disabled = false;
                button.innerText = '送出';
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
